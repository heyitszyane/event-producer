# Cloud Build pipeline for Event Producer
# Builds and deploys the backend (Cloud Run) and frontend (Firebase Hosting).
#
# QA gates (typecheck + lint + tests/eval + build) must all pass before
# any build or deploy step runs.

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: event-producer-api

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:
  # ---------------------------------------------------------------
  # QA Gate 1: Type check (mypy)
  # ---------------------------------------------------------------
  - id: qa-typecheck
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r requirements.txt &&
        python -m mypy event_producer --no-error-summary
    timeout: 120s

  # ---------------------------------------------------------------
  # QA Gate 2: Lint (ruff)
  # ---------------------------------------------------------------
  - id: qa-lint
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        pip install ruff &&
        ruff check .
    timeout: 60s

  # ---------------------------------------------------------------
  # QA Gate 3: Tests (pytest)
  # ---------------------------------------------------------------
  - id: qa-test
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r requirements.txt &&
        python -m pytest --tb=short -q
    timeout: 120s

  # ---------------------------------------------------------------
  # 1. Build backend Docker image
  # ---------------------------------------------------------------
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=deploy/Dockerfile
      - --tag=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
      - --tag=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest
      - .
    waitFor: [qa-typecheck, qa-lint, qa-test]
    timeout: 600s

  # ---------------------------------------------------------------
  # 2. Push to Artifact Registry
  # ---------------------------------------------------------------
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
    waitFor: [build-backend]
    timeout: 300s

  # ---------------------------------------------------------------
  # 3. Deploy to Cloud Run
  # ---------------------------------------------------------------
  - id: deploy-cloudrun
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --max-instances=1
      - --set-env-vars=PYTHONUNBUFFERED=1
      - --service-account=event-producer-runtime@$PROJECT_ID.iam.gserviceaccount.com
    waitFor: [push-backend]
    timeout: 300s

  # ---------------------------------------------------------------
  # 4. Build frontend (Next.js static export)
  # ---------------------------------------------------------------
  - id: build-frontend
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        corepack enable &&
        pnpm -C web install --frozen-lockfile &&
        pnpm -C web run build
    waitFor: [qa-typecheck, qa-lint, qa-test]
    timeout: 600s

  # ---------------------------------------------------------------
  # 5. Deploy frontend to Firebase Hosting (static export)
  # ---------------------------------------------------------------
  # NOTE: Uses gcr.io/$PROJECT_ID/firebase as the deployment image.
  # This image must be available in the target GCP project. If not, use
  # gcr.io/cloud-builders/gcloud with `firebase deploy --only hosting` instead.
  - id: deploy-firebase
    name: gcr.io/$PROJECT_ID/firebase
    entrypoint: bash
    args:
      - -c
      - |
        if [ -f web/out/index.html ]; then
          firebase deploy --only hosting --project $PROJECT_ID
        else
          echo "Frontend build artifact not found (web/out/index.html) -- skipping Firebase deploy."
        fi
    waitFor: [build-frontend]
    timeout: 300s

timeout: 1200s
