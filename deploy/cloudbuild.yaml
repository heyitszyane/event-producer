# Cloud Build pipeline for Event Producer
# Builds and deploys the backend (Cloud Run) and frontend (Firebase Hosting).
#
# QA gates (typecheck + lint + tests/eval + build) must all pass before
# any build or deploy step runs.

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: event-producer-api
  _NEXT_PUBLIC_API_BASE_URL: ""
  _ALLOWED_ORIGINS: ""
  _CASEFILE_STORE: firestore

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:
  # ---------------------------------------------------------------
  # Hosted deploy guard: no localhost/static-host mismatch
  # ---------------------------------------------------------------
  - id: validate-deploy-env
    name: bash:5.2
    entrypoint: bash
    args:
      - -c
      - |
        if [ -z "${_NEXT_PUBLIC_API_BASE_URL}" ]; then
          echo "_NEXT_PUBLIC_API_BASE_URL is required for deployed frontend builds"
          exit 1
        fi
        if [ -z "${_ALLOWED_ORIGINS}" ]; then
          echo "_ALLOWED_ORIGINS is required so the hosted frontend can call Cloud Run"
          exit 1
        fi
        if [ "${_CASEFILE_STORE}" = "firestore" ]; then
          echo "Hosted casefiles will use Firestore."
        fi

  # ---------------------------------------------------------------
  # QA Gate 1: Type check (mypy)
  # ---------------------------------------------------------------
  - id: qa-typecheck
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r requirements.txt &&
        python -m mypy event_producer --no-error-summary
    timeout: 120s

  # ---------------------------------------------------------------
  # QA Gate 2: Lint (ruff)
  # ---------------------------------------------------------------
  - id: qa-lint
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        pip install ruff &&
        ruff check .
    timeout: 60s

  # ---------------------------------------------------------------
  # QA Gate 3: Tests (pytest)
  # ---------------------------------------------------------------
  - id: qa-test
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r requirements.txt &&
        python -m pytest --tb=short -q
    timeout: 120s

  # ---------------------------------------------------------------
  # 1. Build backend Docker image
  # ---------------------------------------------------------------
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=deploy/Dockerfile
      - --tag=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
      - --tag=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest
      - .
    waitFor: [qa-typecheck, qa-lint, qa-test]
    timeout: 600s

  # ---------------------------------------------------------------
  # 2. Push to Artifact Registry
  # ---------------------------------------------------------------
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
    waitFor: [build-backend]
    timeout: 300s

  # ---------------------------------------------------------------
  # 3. Deploy to Cloud Run
  # ---------------------------------------------------------------
  - id: deploy-cloudrun
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --max-instances=1
      - --set-env-vars=PYTHONUNBUFFERED=1,EVENT_PRODUCER_LOAD_DOTENV=false,CASEFILE_STORE=${_CASEFILE_STORE},ALLOWED_ORIGINS=${_ALLOWED_ORIGINS}
      - --service-account=event-producer-runtime@$PROJECT_ID.iam.gserviceaccount.com
    waitFor: [validate-deploy-env, push-backend]
    timeout: 300s

  # ---------------------------------------------------------------
  # 4. Build frontend (Next.js static export)
  # ---------------------------------------------------------------
  - id: build-frontend
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        export NEXT_PUBLIC_API_BASE_URL="${_NEXT_PUBLIC_API_BASE_URL}"
        corepack enable &&
        pnpm -C web install --frozen-lockfile &&
        pnpm -C web run build &&
        ! grep -R "http://127.0.0.1:8080" web/out &&
        ! grep -R "http://localhost:8080" web/out
    waitFor: [validate-deploy-env, qa-typecheck, qa-lint, qa-test]
    timeout: 600s

  # ---------------------------------------------------------------
  # 5. Deploy frontend to Firebase Hosting (static export)
  # ---------------------------------------------------------------
  - id: deploy-firebase
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        if [ -f web/out/index.html ]; then
          npm install --global firebase-tools@15.22.4
          firebase deploy --config firebase.json --only hosting --project $PROJECT_ID
        else
          echo "Frontend build artifact not found (web/out/index.html) -- skipping Firebase deploy."
        fi
    waitFor: [build-frontend]
    timeout: 300s

timeout: 1200s
