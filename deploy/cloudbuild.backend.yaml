# First-pass backend deploy build.
#
# Use this when a new hosted environment does not yet have a Cloud Run URL or
# Firebase Hosting origin. The full deploy/cloudbuild.yaml remains the complete
# QA + backend + frontend deploy lane once those URLs are known.

substitutions:
  _SERVICE_NAME: event-producer-api
  _IMAGE_TAG: manual

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=deploy/Dockerfile
      - --tag=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}
      - --tag=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest
      - .
    timeout: 600s

  - id: push-backend-tag
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}
    waitFor: [build-backend]
    timeout: 300s

  - id: push-backend-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest
    waitFor: [build-backend]
    timeout: 300s

images:
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest

timeout: 900s
